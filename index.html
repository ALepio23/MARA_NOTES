<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MARA.notes</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e4e4e2;
      --border-subtle: #f0f0ee;
      --text-primary: #0c0c0c;
      --text-secondary: #5a5a57;
      --text-muted: #9a9a96;
      --accent: #1a1a1a;
      --accent-hover: #333333;
      --chip-bg: #f0f0ee;
      --chip-text: #3a3a38;
      --warning-bg: #fffbeb;
      --warning-border: #f5d66a;
      --warning-text: #7a5a00;
      --drawer-width: 520px;
      --radius: 8px;
      --radius-sm: 5px;
      --font: -apple-system, "SF Pro Text", system-ui, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 250, 248, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 52px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .header-title span {
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 4px;
    }
    .header-search {
      flex: 1;
      max-width: 320px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      height: 32px;
      padding: 0 10px 0 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font: inherit;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .header-search input:focus { border-color: var(--accent); }
    .header-search input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 13px;
    }
    .doc-count {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── FILTER BAR ── */
    /* ── Minimal filter bar (Notion-style) — only co-founder chips + clear ── */
    .filterbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .filterbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .filter-label-min {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-right: 4px;
      letter-spacing: 0.01em;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chip-btn {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      font: inherit;
      font-size: 12.5px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      user-select: none;
    }
    .chip-btn:hover { background: var(--chip-bg); border-color: var(--text-muted); color: var(--text-primary); }
    .chip-btn.active {
      background: var(--text-primary);
      border-color: var(--text-primary);
      color: #fff;
    }
    .clear-btn {
      height: 24px;
      padding: 0 8px;
      border: none;
      background: none;
      font: inherit;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: color 0.12s;
      margin-left: 4px;
    }
    .clear-btn:hover { color: var(--text-primary); }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── CARD GRID ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    /* ── Notion-style card: typographic, minimal, no colored badges ── */
    .card-notion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 20px 16px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 150px;
    }
    .card-notion:hover {
      background: #fbfaf6;
      border-color: #d6d4cc;
    }

    .card-meta {
      font-size: 11.5px;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }
    .card-meta-type {
      color: var(--text-secondary);
      font-weight: 500;
    }
    .card-meta-sep { color: var(--text-muted); margin: 0 2px; }
    .card-meta-date { }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .card-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
      margin: 2px 0 0;
    }

    /* ── Tasks panel (overlay) ── */
    .header-tasks-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 5px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s;
      margin-left: auto;
    }
    .header-tasks-btn:hover { background: var(--chip-bg); border-color: var(--text-secondary); }
    .tasks-icon { font-size: 14px; }
    .tasks-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 16px;
      padding: 0 5px;
      background: #b35a00;
      color: #fff;
      border-radius: 8px;
      font-size: 10.5px;
      font-weight: 600;
    }
    .tasks-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 250;
      backdrop-filter: blur(3px);
    }
    .tasks-backdrop.open { display: block; }
    .tasks-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 440px;
      max-width: 96vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 251;
      transform: translateX(100%);
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
    }
    .tasks-panel.open { transform: translateX(0); }
    .tasks-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .tasks-panel-title {
      font-size: 16px;
      font-weight: 650;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .tasks-panel-close {
      width: 30px; height: 30px;
      border: none; background: var(--chip-bg);
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      color: var(--text-secondary);
    }
    .tasks-panel-close:hover { background: var(--border); }
    .tasks-panel-filters {
      padding: 12px 22px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tasks-filter-label {
      font-size: 11.5px;
      color: var(--text-muted);
    }
    .tasks-assignee-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tasks-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 22px 24px;
    }
    .task-item {
      display: flex;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .task-item:last-child { border-bottom: none; }
    .task-checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      padding: 0;
      transition: all 0.12s;
    }
    .task-checkbox:hover { border-color: var(--text-secondary); }
    .task-checkbox.checked {
      background: #4f8a4d;
      border-color: #4f8a4d;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .task-item.done .task-title { text-decoration: line-through; color: var(--text-muted); }
    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 13.5px;
      color: var(--text-primary);
      line-height: 1.4;
      font-weight: 500;
    }
    .task-meta {
      margin-top: 4px;
      font-size: 11.5px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .task-meta-assignee {
      background: var(--chip-bg);
      padding: 1px 6px;
      border-radius: 3px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .task-delete {
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }
    .task-delete:hover { background: #fbe7e7; color: #b54040; }
    .tasks-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Add Task button + form inside modal ── */
    .modal-add-task-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      color: var(--text-secondary);
      transition: background 0.12s;
    }
    .modal-add-task-btn:hover { background: var(--chip-bg); color: var(--text-primary); }

    .task-form {
      background: #fbfaf6;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .task-form input[type="text"], .task-form input[type="date"], .task-form select {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      font: inherit;
      font-size: 13px;
      background: var(--surface);
      outline: none;
    }
    .task-form input:focus, .task-form select:focus { border-color: var(--text-secondary); }
    .task-form-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .task-form-row > * { flex: 1; }
    .task-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .task-form-submit {
      border: none;
      background: var(--text-primary);
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
    }
    .task-form-cancel {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    /* ── Cross-link to other doc (inline) ── */
    .doc-link {
      color: var(--text-primary);
      text-decoration: none;
      background: #eef1f7;
      border-radius: 3px;
      padding: 1px 5px;
      font-weight: 500;
      font-size: 0.97em;
      cursor: pointer;
      border-bottom: 1px solid #cdd5e3;
      transition: background 0.12s;
    }
    .doc-link:hover { background: #dde3ef; }
    .doc-link::before { content: '↗ '; opacity: 0.55; font-weight: 400; }

    /* ── Related docs section (modal footer) ── */
    .related-section {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .related-section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .related-card {
      background: #fafaf6;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 11px 13px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .related-card:hover { background: #f3f0e7; border-color: #c4bfb0; }
    .related-card-meta { font-size: 10.5px; color: var(--text-muted); }
    .related-card-title { font-size: 12.5px; font-weight: 500; color: var(--text-primary); line-height: 1.35; }

    /* ── TOC sidebar (left of modal body) ── */
    .toc-sidebar {
      position: absolute;
      top: 32px;
      left: 24px;
      width: 200px;
      max-height: calc(100% - 64px);
      overflow-y: auto;
      padding: 8px 0;
    }
    .toc-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 8px 8px;
    }
    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .toc-item {
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 3px;
      line-height: 1.4;
      border-left: 2px solid transparent;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .toc-item:hover { color: var(--text-primary); background: #f3f0e7; }
    .toc-item.active {
      color: var(--text-primary);
      border-left-color: var(--text-primary);
      font-weight: 500;
    }
    @media (max-width: 1100px) {
      .toc-sidebar { display: none; }
    }

    /* ── Personal notes (localStorage) ── */
    .notes-panel {
      background: #fff8db;
      border: 1px solid #e8d77a;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }
    .notes-panel-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a5a00;
      margin-bottom: 10px;
    }
    .note-item {
      padding: 8px 0;
      border-bottom: 1px solid #e8d77a;
      font-size: 13px;
      color: #3a3a36;
      line-height: 1.5;
    }
    .note-item:last-child { border-bottom: none; }
    .note-meta {
      font-size: 10.5px;
      color: #8a7048;
      margin-top: 3px;
      display: flex;
      gap: 10px;
    }
    .note-delete {
      border: none; background: none; cursor: pointer;
      color: #8a7048; font-size: 12px; padding: 0;
    }
    .note-delete:hover { color: #b54040; }
    .add-note-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .add-note-form textarea {
      border: 1px solid #d6c870;
      border-radius: 4px;
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      background: #fffce8;
      outline: none;
      resize: vertical;
      min-height: 60px;
    }
    .modal-notes-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      color: var(--text-secondary);
      transition: background 0.12s;
    }
    .modal-notes-btn:hover { background: var(--chip-bg); color: var(--text-primary); }
    .modal-notes-btn.has-notes { color: #7a5a00; background: #fff8db; border-color: #e8d77a; }

    /* ── Glossary tooltip ── */
    .glossary-term {
      border-bottom: 1px dotted var(--text-muted);
      cursor: help;
      position: relative;
    }
    .glossary-term:hover { background: #fff8db; }
    .glossary-tooltip {
      position: fixed;
      z-index: 300;
      max-width: 320px;
      background: #2a2a26;
      color: #f5f3ed;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12.5px;
      line-height: 1.5;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    .glossary-tooltip-term {
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
      color: #fff8db;
    }

    /* ── v4 additions: status dot, intent badge, headline, tasks count ── */
    .card-notion { position: relative; }
    .status-dot {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
    }
    .status-dot:hover { transform: scale(1.2); border-color: var(--text-secondary); }
    .status-dot.status-unread  { background: var(--surface); }
    .status-dot.status-read    { background: #c8c6bd; border-color: #c8c6bd; }
    .status-dot.status-done    { background: #4f8a4d; border-color: #4f8a4d; }
    .status-dot.status-archived{ background: var(--border-subtle); border-color: var(--border); opacity: 0.5; }

    .card-intent {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 10px;
      background: var(--chip-bg);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-secondary);
      align-self: flex-start;
    }
    .card-intent-icon { font-size: 13px; line-height: 1; }
    .card-intent-label { font-weight: 500; }

    .card-headline {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.5;
      margin: 8px 0 0;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    .card-tasks-count {
      margin-top: 6px;
      font-size: 12px;
      color: #b35a00;
      font-weight: 500;
    }

    .card-audience {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--text-secondary);
    }
    .card-audience-arrow {
      color: var(--text-muted);
      font-size: 13px;
    }
    .card-audience-text {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Legacy CSS for old card layout — no longer created by JS, but defined for safety */
    .card-notion .card-chips,
    .card-notion .mini-chip,
    .card-notion .audience-footer { display: none; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .empty-state h3 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 13px;
      line-height: 1.6;
      max-width: 380px;
    }
    .empty-state code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--chip-bg);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text-secondary);
    }

    /* ── MODAL BACKDROP (full-screen overlay) ── */
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .drawer-backdrop.open { display: block; }

    /* ── MODAL (full-screen, centered content) ── */

      position: fixed;
      top: 0;

    .drawer-header {
      padding: 18px 32px 16px;

    /* ── LANGUAGE TOGGLE (modal) ── */

    .type-concept-brief     { background: #fffbeb; color: #92400e; }

<script>
function startMaraApp() {
  // ── DATA ──
  const INDEX = window.MARA_INDEX || {version: 1, docs: []};
  const docs = (INDEX && INDEX.docs) ? INDEX.docs : [];

  // ── TYPE LABELS ──
  const TYPE_LABELS = {
    'partnership-brief':  'Partnership recap',
    'meeting-recap':      'Meeting recap',
    'dev-brief':          'Dev brief',
    'strategy-memo':      'Strategy memo',
    'deep-dive':          'Deep-dive',
    'followup-email':     'Follow-up email',
    'action-items':       'Action items',
    'decision-log':       'Decision log',
    'investor-update':    'Investor update',
    'concept-brief':      'Concept brief',
    'cofounder-digest':   'Cofounder digest',
  };
  const TYPE_CSS = {
    'partnership-brief':  'type-partnership-brief',
    'meeting-recap':      'type-meeting-recap',
    'dev-brief':          'type-dev-brief',
    'strategy-memo':      'type-strategy-memo',
    'deep-dive':          'type-deep-dive',
    'followup-email':     'type-followup-email',
    'action-items':       'type-action-items',
    'decision-log':       'type-decision-log',
    'investor-update':    'type-investor-update',
    'concept-brief':      'type-concept-brief',
    'cofounder-digest':   'type-cofounder-digest',
  };
  function typeLabel(t) { return TYPE_LABELS[t] || t; }
  function typeClass(t) { return TYPE_CSS[t] || ''; }

  // ── INTENT BADGE (per doc type — "cosa è questo doc" a colpo d'occhio) ──
  const INTENT_BY_TYPE = {
    'strategy-memo':      { icon: '🎯', label: 'Decisioni da prendere' },
    'action-items':       { icon: '✅', label: 'Da fare' },
    'meeting-recap':      { icon: '📓', label: 'Archivio call' },
    'deep-dive':          { icon: '🔬', label: 'Analisi' },
    'dev-brief':          { icon: '🛠', label: 'Specifica tecnica' },
    'decision-log':       { icon: '📝', label: 'Decisioni prese' },
    'partnership-brief':  { icon: '🤝', label: 'Partnership' },
    'followup-email':     { icon: '✉', label: 'Email' },
    'investor-update':    { icon: '💼', label: 'Update investitori' },
    'concept-brief':      { icon: '💡', label: 'Idea' },
    'cofounder-digest':   { icon: '👥', label: 'Digest team' },
  };
  function intentFor(doc) {
    return INTENT_BY_TYPE[doc.type] || { icon: '📄', label: doc.type || '' };
  }
  function cleanTitle(doc) {
    // Strip the redundant "Tipo —" prefix from titles when present.
    const t = doc.title || doc.filename || '(Senza titolo)';
    const intent = intentFor(doc);
    const prefixes = [
      'Strategy memo — ', 'Dev brief — ', 'Meeting recap — ',
      'Action items — ', 'Deep-dive — ', 'Decision log — ',
      'Partnership brief — ', 'Follow-up email — ',
      'Investor update — ', 'Concept brief — ', 'Cofounder digest — ',
    ];
    for (const pfx of prefixes) {
      if (t.startsWith(pfx)) return t.slice(pfx.length);
    }
    return t;
  }

  // ── STATUS PER DOC (localStorage) ──
  const STATUS_KEY = 'mara_notes_status_v1';
  const STATUS_LABELS = {
    unread:  'Da leggere',
    read:    'Letto',
    done:    'Azioni fatte',
    archived:'Archiviato',
  };
  const STATUS_CYCLE = ['unread', 'read', 'done', 'archived'];
  function loadStatusMap() {
    try { return JSON.parse(localStorage.getItem(STATUS_KEY) || '{}'); } catch (e) { return {}; }
  }
  function saveStatusMap(m) {
    try { localStorage.setItem(STATUS_KEY, JSON.stringify(m)); } catch (e) { /* full quota ignored */ }
  }
  function getDocStatus(docId) { return (loadStatusMap()[docId] || 'unread'); }
  function setDocStatus(docId, s) { const m = loadStatusMap(); m[docId] = s; saveStatusMap(m); }
  function cycleDocStatus(docId) {
    const cur = getDocStatus(docId);
    const idx = STATUS_CYCLE.indexOf(cur);
    const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
    setDocStatus(docId, next);
  }

  // ── TASKS (localStorage) ──
  const TASKS_KEY = 'mara_notes_tasks_v1';
  function loadTasks() {
    try { return JSON.parse(localStorage.getItem(TASKS_KEY) || '[]'); } catch (e) { return []; }
  }
  function saveTasks(arr) {
    try { localStorage.setItem(TASKS_KEY, JSON.stringify(arr)); } catch (e) { /* ignore */ }
  }
  function addTask(t) {
    const arr = loadTasks();
    t.id = 'task-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    t.created_at = new Date().toISOString();
    if (!t.status) t.status = 'open';
    arr.push(t);
    saveTasks(arr);
    return t;
  }
  function updateTaskStatus(taskId, status) {
    const arr = loadTasks();
    const t = arr.find(x => x.id === taskId);
    if (t) { t.status = status; saveTasks(arr); }
  }
  function deleteTask(taskId) {
    const arr = loadTasks().filter(t => t.id !== taskId);
    saveTasks(arr);
  }
  function countOpenTasksForDoc(docId) {
    return loadTasks().filter(t => t.source_doc_id === docId && t.status === 'open').length;
  }

  // ── AUDIENCE INFERENCE ──
  // Derives "for whom" from doc type + entities.
  // Returns {prefix, name, cls, source}. Source documents the provenance
  // of the audience attribution so the reader knows WHY this audience.
  function audienceFor(doc) {
    const t = doc.type || '';
    const people = doc.people || [];
    const companies = doc.companies || [];
    const firstPerson = people[0] || '';
    const firstCompany = companies[0] || '';

    switch (t) {
      case 'dev-brief':
        return firstPerson
          ? { prefix: 'Per', name: firstPerson, cls: 'audience-dev', source: 'doc.people[0]' }
          : { prefix: 'Per', name: 'Davide', cls: 'audience-dev', source: 'default per dev-brief (mara-context/voice.md)' };
      case 'cofounder-digest':
        return { prefix: 'Per', name: 'co-founder MARA', cls: 'audience-cofounder', source: 'tipo cofounder-digest' };
      case 'investor-update':
        return { prefix: 'Per', name: 'investitori', cls: 'audience-investor', source: 'tipo investor-update' };
      case 'partnership-brief':
        return firstCompany
          ? { prefix: 'Per', name: firstCompany, cls: 'audience-partner', source: 'doc.companies[0]' }
          : { prefix: 'Archivio', name: 'partnership', cls: 'audience-partner', source: 'tipo partnership-brief — companies vuoto' };
      case 'followup-email':
        return firstPerson
          ? { prefix: 'Per', name: firstPerson, cls: 'audience-partner', source: 'doc.people[0]' }
          : { prefix: 'Email', name: 'follow-up', cls: 'audience-partner', source: 'tipo followup-email — people vuoto' };
      case 'meeting-recap':
        return { prefix: 'Archivio', name: 'call', cls: 'audience-self', source: 'tipo meeting-recap' };
      case 'action-items':
        return firstPerson
          ? { prefix: 'Owner', name: firstPerson, cls: 'audience-self', source: 'doc.people[0]' }
          : { prefix: 'Per', name: 'team', cls: 'audience-self', source: 'tipo action-items — nessun owner singolo' };
      case 'decision-log':
        return { prefix: 'Archivio', name: 'decisioni', cls: 'audience-self', source: 'tipo decision-log' };
      case 'strategy-memo':
        return { prefix: 'Strategia', name: 'interna', cls: 'audience-self', source: 'tipo strategy-memo' };
      case 'concept-brief':
        return { prefix: 'Idea', name: 'da sviluppare', cls: 'audience-self', source: 'tipo concept-brief' };
      case 'deep-dive':
        return { prefix: 'Ricerca', name: 'personale', cls: 'audience-self', source: 'tipo deep-dive' };
      default:
        return { prefix: '', name: '', cls: 'audience-self', source: 'tipo sconosciuto' };
    }
  }

  // ── STATE (simplified: search + cofounder people filter only) ──
  const state = {
    search: '',
    persons: new Set(),
  };

  // ── CO-FOUNDER LIST (whitelist for the people filter) ──
  // Per mara-context/founders.md — these are the only people shown in the filter bar.
  // Matching is "name appears in doc.people" — full name OR last-name match (more tolerant).
  const COFOUNDERS = [
    { label: 'Gualano',     match: ['gualano',     'michele gualano'] },
    { label: 'Della Rocca', match: ['della rocca', 'alessandro della rocca', 'ale della rocca', 'davide'] },
    { label: 'Zhubi',       match: ['zhubi',       'rita zhubi'] },
    { label: 'Alvigi',      match: ['alvigi',      'alessandro pio alvigi', 'alessandro alvigi'] },
  ];

  function docMatchesCofounder(doc, cof) {
    const people = (doc.people || []).map(p => p.toLowerCase());
    return cof.match.some(needle => people.some(p => p.includes(needle)));
  }

  // ── RENDER COFOUNDER CHIPS ──
  function initFilters() {
    const container = document.getElementById('personFilters');
    container.innerHTML = '';
    COFOUNDERS.forEach(cof => {
      const btn = document.createElement('button');
      btn.className = 'chip-btn';
      btn.textContent = cof.label;
      btn.dataset.value = cof.label;
      btn.addEventListener('click', () => {
        if (state.persons.has(cof.label)) state.persons.delete(cof.label);
        else state.persons.add(cof.label);
        btn.classList.toggle('active');
        document.getElementById('clearFilters').hidden = state.persons.size === 0 && !state.search;
        renderGrid();
      });
      container.appendChild(btn);
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      state.search = e.target.value.toLowerCase();
      document.getElementById('clearFilters').hidden = state.persons.size === 0 && !state.search;
      renderGrid();
    });

    // Clear
    document.getElementById('clearFilters').addEventListener('click', clearFilters);
  }

  function clearFilters() {
    state.search = '';
    state.persons.clear();

    document.getElementById('searchInput').value = '';
    document.querySelectorAll('#personFilters .chip-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('clearFilters').hidden = true;

    renderGrid();
  }

  // ── FILTER DOCS (simplified: search + cofounder match only) ──
  function filterDocs() {
    return docs.filter(doc => {
      // Cofounder filter: doc must include at least one of the selected cofounders
      if (state.persons.size > 0) {
        const matchedAny = [...state.persons].some(label => {
          const cof = COFOUNDERS.find(c => c.label === label);
          return cof && docMatchesCofounder(doc, cof);
        });
        if (!matchedAny) return false;
      }

      // Search across title, summary, people, companies, projects, type
      if (state.search) {
        const needle = state.search;
        const haystack = [
          doc.title || '',
          doc.summary || '',
          ...(doc.people || []),
          ...(doc.companies || []),
          ...(doc.mara_projects || []),
          doc.type || '',
        ].join(' ').toLowerCase();
        if (!haystack.includes(needle)) return false;
      }

      return true;
    });
  }

  // ── FORMAT DATE ──
  function fmtDate(str) {
    if (!str) return '';
    const parts = str.split('-');
    if (parts.length !== 3) return str;
    const [y, m, d] = parts;
    const mi = parseInt(m, 10);
    const di = parseInt(d, 10);
    const months = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
    if (!mi || mi < 1 || mi > 12 || !di) return str;
    return `${di} ${months[mi-1]} ${y}`;
  }

  // ── RENDER CARD (v4 — scannable, intent-first, less prose) ──
  function createCard(doc) {
    const card = document.createElement('div');
    card.className = 'card card-notion';
    card.dataset.docId = doc.id || '';
    card.addEventListener('click', () => openDrawer(doc));

    // Status dot (top-right) — read state from localStorage
    const stDot = document.createElement('button');
    stDot.className = 'status-dot status-' + (getDocStatus(doc.id) || 'unread');
    stDot.title = STATUS_LABELS[getDocStatus(doc.id) || 'unread'];
    stDot.setAttribute('aria-label', 'Cambia stato');
    stDot.addEventListener('click', (e) => {
      e.stopPropagation();
      cycleDocStatus(doc.id);
      const s = getDocStatus(doc.id);
      stDot.className = 'status-dot status-' + s;
      stDot.title = STATUS_LABELS[s];
    });
    card.appendChild(stDot);

    // Top meta line: "Strategy memo · 29 mag"
    const meta = document.createElement('div');
    meta.className = 'card-meta';
    const metaType = document.createElement('span');
    metaType.className = 'card-meta-type';
    metaType.textContent = typeLabel(doc.type);
    meta.appendChild(metaType);
    if (doc.date) {
      const sep = document.createElement('span');
      sep.className = 'card-meta-sep';
      sep.textContent = ' · ';
      meta.appendChild(sep);
      const metaDate = document.createElement('span');
      metaDate.className = 'card-meta-date';
      metaDate.textContent = fmtDate(doc.date);
      meta.appendChild(metaDate);
    }

    // Title — stripped of redundant "Tipo —" prefix
    const title = document.createElement('h3');
    title.className = 'card-title';
    title.textContent = cleanTitle(doc);

    // Intent badge — what kind of action this doc needs (icon + 2-3 words)
    const intent = intentFor(doc);
    const intentLine = document.createElement('div');
    intentLine.className = 'card-intent';
    const intentIcon = document.createElement('span');
    intentIcon.className = 'card-intent-icon';
    intentIcon.textContent = intent.icon;
    const intentLabel = document.createElement('span');
    intentLabel.className = 'card-intent-label';
    intentLabel.textContent = intent.label;
    intentLine.appendChild(intentIcon);
    intentLine.appendChild(intentLabel);

    // Headline — sharp 1-line takeaway (from frontmatter)
    let headlineEl = null;
    if (doc.headline) {
      headlineEl = document.createElement('p');
      headlineEl.className = 'card-headline';
      headlineEl.textContent = doc.headline;
    }

    // Open tasks count for this doc
    const openTasks = countOpenTasksForDoc(doc.id);
    let tasksLine = null;
    if (openTasks > 0) {
      tasksLine = document.createElement('div');
      tasksLine.className = 'card-tasks-count';
      tasksLine.textContent = `📋 ${openTasks} task aperti`;
    }

    // Audience footer — single line
    const aud = audienceFor(doc);
    let audLine = null;
    if (aud.name) {
      audLine = document.createElement('div');
      audLine.className = 'card-audience';
      const arrow = document.createElement('span');
      arrow.className = 'card-audience-arrow';
      arrow.textContent = '→';
      audLine.appendChild(arrow);
      const txt = document.createElement('span');
      txt.className = 'card-audience-text';
      txt.textContent = `${aud.prefix} ${aud.name}`;
      audLine.appendChild(txt);
    }

    card.appendChild(meta);
    card.appendChild(title);
    card.appendChild(intentLine);
    if (headlineEl) card.appendChild(headlineEl);
    if (tasksLine) card.appendChild(tasksLine);
    if (audLine) card.appendChild(audLine);

    return card;
  }

  // ── RENDER GRID ──
  function renderGrid() {
    const grid = document.getElementById('cardGrid');
    const filtered = filterDocs();
    grid.innerHTML = '';

    document.getElementById('docCountLabel').textContent = `(${filtered.length}/${docs.length})`;

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      if (docs.length === 0) {
        empty.innerHTML = `
          <div class="empty-icon">📄</div>
          <h3>Nessun documento ancora.</h3>
          <p>Aggiungi appunti in <code>~/Desktop/MARA.notes/_inbox/</code> o incollali in chat.</p>`;
      } else {
        empty.innerHTML = `
          <div class="empty-icon">🔍</div>
          <h3>Nessun risultato.</h3>
          <p>Prova a modificare i filtri o la ricerca.</p>`;
      }
      grid.appendChild(empty);
      return;
    }

    // Sort: newest first (stable comparator — returns 0 for equal dates)
    const sorted = [...filtered].sort((a, b) => {
      const da = a.date || '';
      const db = b.date || '';
      if (db > da) return 1;
      if (db < da) return -1;
      return 0;
    });
    sorted.forEach(doc => grid.appendChild(createCard(doc)));
  }

  // ── DRAWER / MODAL + BROWSER HISTORY ──
  let currentDoc = null;
  let currentLang = 'it';  // 'it' or 'en' — modal-scoped, resets on each open
  let suppressNextPopState = false;

  // Extract the IT body and (optional) EN body from a doc's body_md.
  // Marker convention in source .md:  <!-- EN_BODY -->...<!-- /EN_BODY -->
  // EN block is stripped from IT body when rendering IT, and used directly when rendering EN.
  function extractBodies(bodyMd) {
    if (!bodyMd) return { it: '', en: null };
    const re = /<!--\s*EN_BODY\s*-->([\s\S]*?)<!--\s*\/EN_BODY\s*-->/i;
    const m = bodyMd.match(re);
    if (!m) return { it: bodyMd, en: null };
    return {
      it: bodyMd.replace(re, '').trim(),
      en: m[1].trim(),
    };
  }

  function renderModalBody(doc, lang) {
    const body = document.getElementById('drawerBody');
    if (!body) return;
    body.innerHTML = '';

    // Discrepancy warning (only shown if flagged)
    if (doc.discrepancies_flagged) {
      const warn = document.createElement('div');
      warn.className = 'discrepancy-box';
      warn.innerHTML = '<strong>⚠ Discrepanze tra fonti</strong> — Questo documento contiene discrepanze segnalate.';
      body.appendChild(warn);
    }

    const bodies = extractBodies(doc.body_md);
    let mdText = (lang === 'en' && bodies.en) ? bodies.en : bodies.it;

    // Strip YAML frontmatter if present
    if (mdText.startsWith('---')) {
      const endIdx = mdText.indexOf('---', 3);
      if (endIdx !== -1) mdText = mdText.slice(endIdx + 3).trim();
    }

    // Extract narrative summary block from the chosen-language body
    const narrativeRe = /<!--\s*NARRATIVE_SUMMARY\s*-->([\s\S]*?)<!--\s*\/NARRATIVE_SUMMARY\s*-->/i;
    const narrativeMatch = mdText.match(narrativeRe);
    if (narrativeMatch) {
      const narrativeMd = narrativeMatch[1].trim();
      const nDiv = document.createElement('div');
      nDiv.className = 'narrative-summary';
      const nLabel = document.createElement('div');
      nLabel.className = 'narrative-summary-label';
      nLabel.textContent = lang === 'en' ? '📖 Narrative summary' : '📖 Sintesi narrativa';
      nDiv.appendChild(nLabel);
      const nBody = document.createElement('div');
      if (window.marked && window.DOMPurify) {
        nBody.innerHTML = DOMPurify.sanitize(marked.parse(narrativeMd));
      } else {
        const pre = document.createElement('pre');
        pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
        pre.textContent = narrativeMd;
        nBody.appendChild(pre);
      }
      nDiv.appendChild(nBody);
      body.appendChild(nDiv);
      mdText = mdText.replace(narrativeRe, '').trim();
    }

    // Main MD body
    const mdContainer = document.createElement('div');
    mdContainer.className = 'md-body';
    if (window.marked && window.DOMPurify) {
      mdContainer.innerHTML = DOMPurify.sanitize(marked.parse(mdText));
      // Cross-link doc references first, then glossary terms.
      // Wrap in try/catch so a bug in one of these helpers never prevents the
      // modal body from showing up (defensive — the rest of openDrawer flow
      // still completes and the modal becomes visible).
      try { applyCrossLinks(mdContainer); } catch (e) { console.warn('[viewer] applyCrossLinks failed', e); }
      try { applyGlossary(mdContainer); }   catch (e) { console.warn('[viewer] applyGlossary failed', e); }
    } else {
      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap;font:inherit;';
      pre.textContent = mdText;
      mdContainer.appendChild(pre);
    }
    body.appendChild(mdContainer);

    // Personal notes panel at the top of body (if any exist for this doc)
    try {
      const notesPanel = renderNotesPanel(body, doc);
      if (notesPanel) body.insertBefore(notesPanel, body.firstChild);
    } catch (e) { console.warn('[viewer] renderNotesPanel failed', e); }

    // Build TOC sidebar from H2 headings
    try { renderTOC(body, mdContainer); } catch (e) { console.warn('[viewer] renderTOC failed', e); }

    // Related docs at the bottom
    try { renderRelated(body, doc); } catch (e) { console.warn('[viewer] renderRelated failed', e); }

    // Metadata footer
    const meta = document.createElement('div');
    meta.className = 'meta-section';
    function metaRow(key, items, isChips) {
      if (!items || (Array.isArray(items) && items.length === 0)) return;
      if (!Array.isArray(items)) items = [items];
      const row = document.createElement('div');
      row.className = 'meta-row';
      const k = document.createElement('span');
      k.className = 'meta-key';
      k.textContent = key;
      const v = document.createElement('div');
      v.className = 'meta-val';
      if (isChips) {
        items.forEach(item => {
          const c = document.createElement('span');
          c.className = 'meta-chip';
          c.textContent = item;
          v.appendChild(c);
        });
      } else {
        const t = document.createElement('span');
        t.className = 'meta-val-text';
        t.textContent = items.join(', ');
        v.appendChild(t);
      }
      row.appendChild(k);
      row.appendChild(v);
      meta.appendChild(row);
    }
    metaRow(lang === 'en' ? 'People' : 'Persone', doc.people, true);
    metaRow(lang === 'en' ? 'Companies' : 'Aziende', doc.companies, true);
    metaRow(lang === 'en' ? 'Projects' : 'Progetti', doc.mara_projects, true);
    metaRow(lang === 'en' ? 'Sources' : 'Fonti', doc.sources_used, false);
    if (doc.iteration_count && doc.iteration_count > 1) {
      const iter = document.createElement('p');
      iter.className = 'iteration-note';
      iter.textContent = `Iterazione ${doc.iteration_count} · Aggiornato ${doc.updated_at || ''}`;
      meta.appendChild(iter);
    }
    if (meta.children.length > 0) body.appendChild(meta);
  }

  function openDrawer(doc, opts) {
    opts = opts || {};
    currentDoc = doc;
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('drawerBackdrop');

    // Push a history entry so browser-back closes the modal.
    // Skip pushState when we're restoring from a hash on page load (opts.fromHash)
    // or when navigating via popstate (opts.fromPopState).
    if (!opts.fromHash && !opts.fromPopState && doc.id) {
      try {
        history.pushState({ marasDocId: doc.id }, '', '#' + doc.id);
      } catch (e) {
        // Some browsers (file://) block pushState — degrade silently.
        console.warn('[modal] pushState blocked:', e.message);
      }
    } else if (opts.fromHash && doc.id) {
      // On hash deep-link load we replaceState so the initial entry IS the modal.
      try {
        history.replaceState({ marasDocId: doc.id }, '', '#' + doc.id);
      } catch (e) { /* ignore */ }
    }

    document.getElementById('drawerTitle').textContent = doc.title || doc.filename || '(Senza titolo)';

    // Meta line
    const metaLine = document.getElementById('drawerMetaLine');
    metaLine.innerHTML = '';
    const tChip = document.createElement('span');
    tChip.className = `type-chip ${typeClass(doc.type)}`;
    tChip.textContent = typeLabel(doc.type);
    metaLine.appendChild(tChip);

    const dateSpan = document.createElement('span');
    dateSpan.className = 'drawer-date';
    dateSpan.textContent = fmtDate(doc.date);
    metaLine.appendChild(dateSpan);

    if (doc.language && doc.language.toLowerCase() !== 'it') {
      const langBadge = document.createElement('span');
      langBadge.className = 'lang-badge';
      langBadge.textContent = doc.language.toUpperCase();
      metaLine.appendChild(langBadge);
    }

    // Audience badge in modal header
    const audM = audienceFor(doc);
    if (audM.name) {
      const audBadgeM = document.createElement('span');
      audBadgeM.className = `audience-badge ${audM.cls}`;
      audBadgeM.textContent = `${audM.prefix} ${audM.name}`;
      audBadgeM.title = `Aggancio audience derivato da: ${audM.source}`;
      metaLine.appendChild(audBadgeM);
    }

    // + Task button — opens an inline task form
    const addTaskBtn = document.createElement('button');
    addTaskBtn.className = 'modal-add-task-btn';
    addTaskBtn.textContent = '+ Task';
    addTaskBtn.title = 'Crea task associato a questo doc';
    addTaskBtn.addEventListener('click', () => {
      toggleTaskForm(doc);
    });
    metaLine.appendChild(addTaskBtn);

    // 💬 Note button — opens an inline note form (personal note for this doc)
    const noteBtn = document.createElement('button');
    noteBtn.className = 'modal-notes-btn';
    const existingCount = getNotesForDoc(doc.id).length;
    if (existingCount > 0) noteBtn.classList.add('has-notes');
    noteBtn.textContent = existingCount > 0 ? '💬 Nota (' + existingCount + ')' : '💬 Nota';
    noteBtn.title = 'Annota questo doc (solo tu, solo questo browser)';
    noteBtn.addEventListener('click', () => {
      toggleNotesForm(doc);
    });
    metaLine.appendChild(noteBtn);

    // Auto-mark as "read" when opened (if it was unread)
    if (getDocStatus(doc.id) === 'unread') {
      setDocStatus(doc.id, 'read');
    }

    // EN / IT toggle — only visible when the doc has an EN_BODY block
    const bodies = extractBodies(doc.body_md);
    currentLang = 'it';  // always reset to IT on open
    if (bodies.en) {
      const langToggle = document.createElement('div');
      langToggle.className = 'lang-toggle';
      const btnIt = document.createElement('button');
      btnIt.textContent = 'IT';
      btnIt.className = 'active';
      const btnEn = document.createElement('button');
      btnEn.textContent = 'EN';
      btnIt.addEventListener('click', () => {
        currentLang = 'it';
        btnIt.classList.add('active');
        btnEn.classList.remove('active');
        renderModalBody(doc, 'it');
      });
      btnEn.addEventListener('click', () => {
        currentLang = 'en';
        btnEn.classList.add('active');
        btnIt.classList.remove('active');
        renderModalBody(doc, 'en');
      });
      langToggle.appendChild(btnIt);
      langToggle.appendChild(btnEn);
      metaLine.appendChild(langToggle);
    }

    // Open the modal FIRST, then render body. If body rendering throws,
    // the modal is at least visible (the user can close it) instead of
    // the click appearing to do nothing.
    drawer.classList.add('open');
    backdrop.classList.add('open');

    try {
      renderModalBody(doc, currentLang);
    } catch (e) {
      console.error('[viewer] renderModalBody failed:', e);
      const body = document.getElementById('drawerBody');
      if (body) {
        body.innerHTML = '<div style="padding:20px;color:#b54040;background:#fbe7e7;border:1px solid #d6a0a0;border-radius:6px;"><strong>Errore di rendering</strong><br>' + (e.message || e) + '<br><small>Apri la console (Cmd+Opt+J) per i dettagli.</small></div>';
      }
    }

    const scroller = document.querySelector('.drawer-body');
    if (scroller) scroller.scrollTop = 0;
  }

  // closeDrawer:
  //   - default (user clicked × / "Indietro" / backdrop / Esc): pop history → triggers popstate which calls us again with fromPopState=true → actually close.
  //   - fromPopState=true: just close (browser already popped the entry).
  function closeDrawer(opts) {
    opts = opts || {};
    const drawer = document.getElementById('drawer');
    if (!drawer.classList.contains('open')) return;

    if (!opts.fromPopState && history.state && history.state.marasDocId) {
      // Let the browser pop the entry; popstate handler will run and call closeDrawer({fromPopState:true})
      history.back();
      return;
    }

    drawer.classList.remove('open');
    document.getElementById('drawerBackdrop').classList.remove('open');
    currentDoc = null;

    // If we close NOT via popstate, clear the hash so the URL is clean
    if (!opts.fromPopState && location.hash) {
      try {
        history.replaceState({}, '', location.pathname + location.search);
      } catch (e) { /* ignore */ }
    }
  }

  // Browser back/forward — close modal when popping the modal entry
  window.addEventListener('popstate', (e) => {
    const drawer = document.getElementById('drawer');
    if (drawer.classList.contains('open')) {
      closeDrawer({ fromPopState: true });
    } else if (e.state && e.state.marasDocId) {
      // Forward navigation back into a modal entry — reopen the doc
      const doc = docs.find(d => d.id === e.state.marasDocId);
      if (doc) openDrawer(doc, { fromPopState: true });
    }
  });

  document.getElementById('drawerClose').addEventListener('click', () => closeDrawer());
  document.getElementById('drawerBack').addEventListener('click', () => closeDrawer());
  document.getElementById('drawerBackdrop').addEventListener('click', () => closeDrawer());
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
  });

  // ── HASH DEEP-LINK ──
  // If page loads with #doc-id matching a doc, auto-open that modal.
  function openFromHash() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return;
    const doc = docs.find(d => d.id === hash);
    if (doc) openDrawer(doc, { fromHash: true });
  }

  // ── TASKS PANEL UI ──
  function refreshTasksBadge() {
    const open = loadTasks().filter(t => t.status === 'open').length;
    const badge = document.getElementById('tasksCountBadge');
    if (open > 0) {
      badge.textContent = String(open);
      badge.hidden = false;
    } else {
      badge.hidden = true;
    }
  }

  let tasksAssigneeFilter = '__all__';
  function renderAssigneeFilterChips() {
    const container = document.getElementById('tasksAssigneeFilter');
    container.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'chip-btn' + (tasksAssigneeFilter === '__all__' ? ' active' : '');
    allBtn.textContent = 'Tutti';
    allBtn.addEventListener('click', () => {
      tasksAssigneeFilter = '__all__';
      renderAssigneeFilterChips();
      renderTasksList();
    });
    container.appendChild(allBtn);
    COFOUNDERS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'chip-btn' + (tasksAssigneeFilter === c.label ? ' active' : '');
      b.textContent = c.label;
      b.addEventListener('click', () => {
        tasksAssigneeFilter = c.label;
        renderAssigneeFilterChips();
        renderTasksList();
      });
      container.appendChild(b);
    });
    const unassignedBtn = document.createElement('button');
    unassignedBtn.className = 'chip-btn' + (tasksAssigneeFilter === '__none__' ? ' active' : '');
    unassignedBtn.textContent = 'Senza owner';
    unassignedBtn.addEventListener('click', () => {
      tasksAssigneeFilter = '__none__';
      renderAssigneeFilterChips();
      renderTasksList();
    });
    container.appendChild(unassignedBtn);
  }

  function renderTasksList() {
    const body = document.getElementById('tasksPanelBody');
    body.innerHTML = '';
    let arr = loadTasks().sort((a, b) => {
      // Open first, then by due_date asc, then by created_at desc
      if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
      if (a.due_date && b.due_date) return a.due_date.localeCompare(b.due_date);
      if (a.due_date) return -1;
      if (b.due_date) return 1;
      return (b.created_at || '').localeCompare(a.created_at || '');
    });
    if (tasksAssigneeFilter === '__none__') {
      arr = arr.filter(t => !t.assignee);
    } else if (tasksAssigneeFilter !== '__all__') {
      arr = arr.filter(t => t.assignee === tasksAssigneeFilter);
    }
    if (arr.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'tasks-empty';
      empty.innerHTML = 'Nessun task per questo filtro.<br>Apri un doc → click <strong>+ Task</strong> per crearne uno.';
      body.appendChild(empty);
      return;
    }
    arr.forEach(t => {
      const item = document.createElement('div');
      item.className = 'task-item' + (t.status === 'done' ? ' done' : '');

      const cb = document.createElement('button');
      cb.className = 'task-checkbox' + (t.status === 'done' ? ' checked' : '');
      cb.textContent = t.status === 'done' ? '✓' : '';
      cb.title = t.status === 'done' ? 'Riapri task' : 'Marca come fatto';
      cb.addEventListener('click', () => {
        updateTaskStatus(t.id, t.status === 'done' ? 'open' : 'done');
        renderTasksList();
        refreshTasksBadge();
        renderGrid(); // refresh card task counts
      });
      item.appendChild(cb);

      const body2 = document.createElement('div');
      body2.className = 'task-body';
      const ttl = document.createElement('div');
      ttl.className = 'task-title';
      ttl.textContent = t.title;
      body2.appendChild(ttl);
      const meta = document.createElement('div');
      meta.className = 'task-meta';
      if (t.assignee) {
        const a = document.createElement('span');
        a.className = 'task-meta-assignee';
        a.textContent = t.assignee;
        meta.appendChild(a);
      }
      if (t.due_date) {
        const d = document.createElement('span');
        d.textContent = '📅 ' + fmtDate(t.due_date);
        meta.appendChild(d);
      }
      if (t.source_doc_title) {
        const s = document.createElement('span');
        s.textContent = '↳ ' + t.source_doc_title;
        s.style.cursor = 'pointer';
        s.title = 'Apri doc sorgente';
        s.addEventListener('click', () => {
          const d = docs.find(x => x.id === t.source_doc_id);
          if (d) {
            closeTasksPanel();
            setTimeout(() => openDrawer(d), 80);
          }
        });
        meta.appendChild(s);
      }
      body2.appendChild(meta);
      item.appendChild(body2);

      const del = document.createElement('button');
      del.className = 'task-delete';
      del.textContent = '🗑';
      del.title = 'Elimina task';
      del.addEventListener('click', () => {
        if (confirm('Eliminare il task "' + t.title + '"?')) {
          deleteTask(t.id);
          renderTasksList();
          refreshTasksBadge();
          renderGrid();
        }
      });
      item.appendChild(del);

      body.appendChild(item);
    });
  }

  function toggleTaskForm(doc) {
    const body = document.getElementById('drawerBody');
    if (!body) return;
    const existing = body.querySelector('.task-form');
    if (existing) { existing.remove(); return; }

    const form = document.createElement('div');
    form.className = 'task-form';

    const titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.placeholder = 'Cosa va fatto?';
    form.appendChild(titleInput);

    const row = document.createElement('div');
    row.className = 'task-form-row';
    const assigneeSel = document.createElement('select');
    const optNone = document.createElement('option');
    optNone.value = '';
    optNone.textContent = 'Senza owner';
    assigneeSel.appendChild(optNone);
    COFOUNDERS.forEach(c => {
      const o = document.createElement('option');
      o.value = c.label;
      o.textContent = c.label;
      assigneeSel.appendChild(o);
    });
    row.appendChild(assigneeSel);
    const dueInput = document.createElement('input');
    dueInput.type = 'date';
    dueInput.title = 'Scadenza (opzionale)';
    row.appendChild(dueInput);
    form.appendChild(row);

    const actions = document.createElement('div');
    actions.className = 'task-form-actions';
    const cancel = document.createElement('button');
    cancel.className = 'task-form-cancel';
    cancel.textContent = 'Annulla';
    cancel.addEventListener('click', () => form.remove());
    const submit = document.createElement('button');
    submit.className = 'task-form-submit';
    submit.textContent = 'Crea task';
    submit.addEventListener('click', () => {
      const txt = titleInput.value.trim();
      if (!txt) { titleInput.focus(); return; }
      addTask({
        title: txt,
        assignee: assigneeSel.value || null,
        due_date: dueInput.value || null,
        source_doc_id: doc.id,
        source_doc_title: cleanTitle(doc),
      });
      form.remove();
      refreshTasksBadge();
      // Insert "task created" toast
      const toast = document.createElement('div');
      toast.style.cssText = 'background:#e6f3df;border:1px solid #4f8a4d;color:#2e5a2c;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:14px;';
      toast.textContent = '✓ Task creato. Visibile nel pannello Tasks in alto a destra.';
      body.insertBefore(toast, body.firstChild);
      setTimeout(() => toast.remove(), 3500);
      renderGrid(); // update card count
    });
    actions.appendChild(cancel);
    actions.appendChild(submit);
    form.appendChild(actions);

    body.insertBefore(form, body.firstChild);
    titleInput.focus();
  }

  function openTasksPanel() {
    document.getElementById('tasksPanel').classList.add('open');
    document.getElementById('tasksBackdrop').classList.add('open');
    renderAssigneeFilterChips();
    renderTasksList();
  }
  function closeTasksPanel() {
    document.getElementById('tasksPanel').classList.remove('open');
    document.getElementById('tasksBackdrop').classList.remove('open');
  }
  document.getElementById('tasksBtn').addEventListener('click', openTasksPanel);
  document.getElementById('tasksPanelClose').addEventListener('click', closeTasksPanel);
  document.getElementById('tasksBackdrop').addEventListener('click', closeTasksPanel);

  // ── GLOSSARY (MARA terms with definitions, applied in modal body via hover popup) ──
  const GLOSSARY = {
    'challenge': { def: 'Formato proprietario MARA: sfida da risolvere su brief reale di un\'azienda partner, sprint 2 settimane (o 24-48h hackathon), valutazione su 5 criteri pubblici, prezzo €5K flat, IP al 100% all\'azienda. NON una competizione generica.' },
    'credential': { def: 'Soulbound Token (SBT) emesso su Polygon a fine challenge. Attestazione permanente di proof-of-work, verificabile on-chain, <€0,01 di costo, zero-friction (no MetaMask, no gas, no seed phrase).' },
    'SBT': { def: 'Soulbound Token — credenziale on-chain non trasferibile emessa da MARA al termine di una challenge. Su Polygon mainnet via MaraSBT.mintSBT().' },
    'partner brand': { def: 'Azienda che sponsorizza e brief-a una challenge MARA. Paga €5K flat, fornisce il brief, partecipa alla giuria, riceve tutto l\'IP del lavoro prodotto.' },
    'platform traction': { def: 'Framing usato quando MARA ospita una challenge per un cliente esterno (es. TLC/Lux Collective): la traction è della piattaforma MARA, non del progetto studentesco. Usato in investor update e partnership brief.' },
    'talent pipeline': { def: 'Fase 5 della challenge: dopo la premiazione, MARA e il partner inviano ai partecipanti migliori (non solo vincitori) proposte di colloquio/stage/assunzione. Non tutte le challenge la usano — dipende dall\'accordo.' },
    'brief': { def: 'Il problema di business reale che il partner aziendale presenta ai team all\'inizio della challenge: contesto, deliverable attesi, criteri di valutazione, vincoli. Firmato prima della challenge, non modificabile a sprint iniziato.' },
    'stage': { def: 'Fase della challenge. Le 5 standard: Pre-Challenge Consulting → Brief & Design → Sprint → Evaluation & Winner → Talent Pipeline.' },
    'TLC': { def: 'The Lux Collective — gruppo alberghiero "conscious luxury" con HQ Mauritius, CEO Olivier Chavy, portfolio LUX*/SALT/SOCIO/Tamassa. Primo partner brand globale MARA (challenge marzo-aprile 2026).' },
    'Lux Collective': { def: 'The Lux Collective (TLC) — primo partner brand globale di MARA, gruppo alberghiero con 18+ resort, HQ Mauritius.' },
    'co-founder': { def: 'I 4 fondatori MARA: Michele Gualano (Business), Alessandro Della Rocca (IT), Rita Zhubi (Operations), Alessandro Pio Alvigi (Marketing).' },
    'hub': { def: 'Nel framework Roby: master privati, business school, incubatori, Camere di Commercio, università — istituzioni che intermediano candidati verso MARA. Gli accordi con questi vanno chiusi PRIMA delle challenge alle aziende.' },
  };
  const GLOSSARY_KEYS = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);

  let glossaryTooltipEl = null;
  function showGlossaryTooltip(term, anchorRect) {
    hideGlossaryTooltip();
    const entry = GLOSSARY[term];
    if (!entry) return;
    glossaryTooltipEl = document.createElement('div');
    glossaryTooltipEl.className = 'glossary-tooltip';
    const t = document.createElement('div');
    t.className = 'glossary-tooltip-term';
    t.textContent = term;
    const d = document.createElement('div');
    d.textContent = entry.def;
    glossaryTooltipEl.appendChild(t);
    glossaryTooltipEl.appendChild(d);
    document.body.appendChild(glossaryTooltipEl);
    // Position: below + left of cursor
    const r = glossaryTooltipEl.getBoundingClientRect();
    let top = anchorRect.bottom + 6;
    if (top + r.height > window.innerHeight) top = anchorRect.top - r.height - 6;
    let left = anchorRect.left;
    if (left + r.width > window.innerWidth - 10) left = window.innerWidth - r.width - 10;
    glossaryTooltipEl.style.top = top + 'px';
    glossaryTooltipEl.style.left = left + 'px';
  }
  function hideGlossaryTooltip() {
    if (glossaryTooltipEl) {
      glossaryTooltipEl.remove();
      glossaryTooltipEl = null;
    }
  }

  // ── CROSS-LINK: detect filename refs (YYYY-MM-DD-...md) in body and make clickable ──
  const FILENAME_RE = /(\d{4}-\d{2}-\d{2}-[a-z0-9-]+\.md)/gi;
  function applyCrossLinks(container) {
    if (!container) return;
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => {
        const p = n.parentNode;
        if (!p) return NodeFilter.FILTER_REJECT;
        const tag = p.tagName;
        if (['A', 'CODE', 'PRE'].includes(tag)) return NodeFilter.FILTER_REJECT;
        if (p.classList && p.classList.contains('doc-link')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const texts = [];
    let n;
    while ((n = walker.nextNode())) {
      if (FILENAME_RE.test(n.nodeValue)) {
        FILENAME_RE.lastIndex = 0;
        texts.push(n);
      }
    }
    texts.forEach(t => {
      const v = t.nodeValue;
      const parts = v.split(FILENAME_RE);
      if (parts.length < 2) return;
      const frag = document.createDocumentFragment();
      parts.forEach(piece => {
        if (FILENAME_RE.test(piece)) {
          FILENAME_RE.lastIndex = 0;
          const target = docs.find(d => d.filename === piece);
          if (target) {
            const a = document.createElement('a');
            a.className = 'doc-link';
            a.href = '#' + target.id;
            a.textContent = cleanTitle(target);
            a.title = 'Apri: ' + target.title;
            a.addEventListener('click', (e) => {
              e.preventDefault();
              closeDrawer({ fromPopState: true });
              setTimeout(() => openDrawer(target), 80);
            });
            frag.appendChild(a);
          } else {
            // No matching doc — leave as plain text
            frag.appendChild(document.createTextNode(piece));
          }
        } else {
          frag.appendChild(document.createTextNode(piece));
        }
      });
      t.parentNode.replaceChild(frag, t);
    });
  }

  // ── RELATED DOCS: shared mara_projects OR people (excluding self) ──
  function findRelated(doc) {
    const myProj = new Set(doc.mara_projects || []);
    const myPpl  = new Set((doc.people || []).map(p => p.toLowerCase()));
    const scored = docs
      .filter(d => d.id !== doc.id)
      .map(d => {
        let s = 0;
        (d.mara_projects || []).forEach(p => { if (myProj.has(p)) s += 2; });
        (d.people || []).forEach(p => { if (myPpl.has(p.toLowerCase())) s += 1; });
        return { d, s };
      })
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .slice(0, 4)
      .map(x => x.d);
    return scored;
  }
  function renderRelated(parent, doc) {
    const related = findRelated(doc);
    if (related.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'related-section';
    const label = document.createElement('div');
    label.className = 'related-section-label';
    label.textContent = '↪ Vedi anche';
    sec.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'related-grid';
    related.forEach(r => {
      const card = document.createElement('div');
      card.className = 'related-card';
      const meta = document.createElement('div');
      meta.className = 'related-card-meta';
      meta.textContent = typeLabel(r.type) + ' · ' + fmtDate(r.date);
      const ttl = document.createElement('div');
      ttl.className = 'related-card-title';
      ttl.textContent = cleanTitle(r);
      card.appendChild(meta);
      card.appendChild(ttl);
      card.addEventListener('click', () => {
        closeDrawer({ fromPopState: true });
        setTimeout(() => openDrawer(r), 80);
      });
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    parent.appendChild(sec);
  }

  // ── TOC: build from H2 headings ──
  function renderTOC(modalBody, mdContainer) {
    const drawer = document.getElementById('drawer');
    // Remove old TOC if present
    const oldToc = drawer.querySelector('.toc-sidebar');
    if (oldToc) oldToc.remove();
    const h2s = mdContainer.querySelectorAll('h2');
    if (h2s.length < 3) return;  // not worth showing TOC for short docs
    const toc = document.createElement('aside');
    toc.className = 'toc-sidebar';
    const lbl = document.createElement('div');
    lbl.className = 'toc-label';
    lbl.textContent = 'In questo doc';
    toc.appendChild(lbl);
    const ul = document.createElement('ul');
    ul.className = 'toc-list';
    h2s.forEach((h, idx) => {
      // Assign an id if missing (for scrollIntoView)
      if (!h.id) h.id = 'sec-' + idx + '-' + (h.textContent || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30);
      const li = document.createElement('li');
      li.className = 'toc-item';
      li.textContent = h.textContent;
      li.addEventListener('click', () => {
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        ul.querySelectorAll('.toc-item.active').forEach(x => x.classList.remove('active'));
        li.classList.add('active');
      });
      ul.appendChild(li);
    });
    toc.appendChild(ul);
    // Append to drawer (positioned absolutely so it overlays the body left edge)
    drawer.appendChild(toc);
  }

  // ── PERSONAL NOTES per doc (localStorage) ──
  const NOTES_KEY = 'mara_notes_personal_v1';
  function loadNotesMap() {
    try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '{}'); } catch (e) { return {}; }
  }
  function saveNotesMap(m) { try { localStorage.setItem(NOTES_KEY, JSON.stringify(m)); } catch (e) { /**/ } }
  function getNotesForDoc(docId) { return loadNotesMap()[docId] || []; }
  function addNoteToDoc(docId, text) {
    const m = loadNotesMap();
    if (!m[docId]) m[docId] = [];
    m[docId].push({ id: 'n-' + Date.now(), text, created_at: new Date().toISOString() });
    saveNotesMap(m);
  }
  function deleteNoteFromDoc(docId, noteId) {
    const m = loadNotesMap();
    if (!m[docId]) return;
    m[docId] = m[docId].filter(n => n.id !== noteId);
    saveNotesMap(m);
  }
  function renderNotesPanel(parent, doc) {
    const notes = getNotesForDoc(doc.id);
    if (notes.length === 0) return null;
    const panel = document.createElement('div');
    panel.className = 'notes-panel';
    const lbl = document.createElement('div');
    lbl.className = 'notes-panel-label';
    lbl.textContent = '💬 Note personali (' + notes.length + ')';
    panel.appendChild(lbl);
    notes.forEach(n => {
      const item = document.createElement('div');
      item.className = 'note-item';
      const txt = document.createElement('div');
      txt.textContent = n.text;
      item.appendChild(txt);
      const meta = document.createElement('div');
      meta.className = 'note-meta';
      const d = new Date(n.created_at);
      const dateStr = d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      const t = document.createElement('span');
      t.textContent = dateStr;
      meta.appendChild(t);
      const del = document.createElement('button');
      del.className = 'note-delete';
      del.textContent = 'elimina';
      del.addEventListener('click', () => {
        if (confirm('Eliminare questa nota?')) {
          deleteNoteFromDoc(doc.id, n.id);
          // Re-render
          panel.remove();
          const refreshed = renderNotesPanel(parent, doc);
          if (refreshed) parent.insertBefore(refreshed, parent.firstChild);
        }
      });
      meta.appendChild(del);
      item.appendChild(meta);
      panel.appendChild(item);
    });
    return panel;
  }
  function toggleNotesForm(doc) {
    const body = document.getElementById('drawerBody');
    if (!body) return;
    const existing = body.querySelector('.add-note-form');
    if (existing) { existing.remove(); return; }
    const form = document.createElement('div');
    form.className = 'add-note-form notes-panel';
    const lbl = document.createElement('div');
    lbl.className = 'notes-panel-label';
    lbl.textContent = '💬 Nuova nota';
    form.appendChild(lbl);
    const ta = document.createElement('textarea');
    ta.placeholder = 'Cosa annotare? Pensieri, dubbi, link, riflessioni…';
    form.appendChild(ta);
    const actions = document.createElement('div');
    actions.className = 'task-form-actions';
    const cancel = document.createElement('button');
    cancel.className = 'task-form-cancel';
    cancel.textContent = 'Annulla';
    cancel.addEventListener('click', () => form.remove());
    const submit = document.createElement('button');
    submit.className = 'task-form-submit';
    submit.textContent = 'Salva nota';
    submit.addEventListener('click', () => {
      const v = ta.value.trim();
      if (!v) { ta.focus(); return; }
      addNoteToDoc(doc.id, v);
      form.remove();
      // Re-render notes panel at top
      const oldPanel = body.querySelector('.notes-panel');
      const newPanel = renderNotesPanel(body, doc);
      if (oldPanel) oldPanel.remove();
      if (newPanel) body.insertBefore(newPanel, body.firstChild);
      // Update notes button state
      const btn = document.querySelector('.modal-notes-btn');
      if (btn) btn.classList.add('has-notes');
    });
    actions.appendChild(cancel);
    actions.appendChild(submit);
    form.appendChild(actions);
    body.insertBefore(form, body.firstChild);
    ta.focus();
  }

  // Applies glossary spans inside a rendered HTML container.
  // Avoids matching inside <a>, <code>, headings, blockquotes.
  function applyGlossary(container) {
    if (!container) return;
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => {
        const p = n.parentNode;
        if (!p) return NodeFilter.FILTER_REJECT;
        const tag = p.tagName;
        if (['A', 'CODE', 'PRE', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'BUTTON', 'BLOCKQUOTE'].includes(tag)) return NodeFilter.FILTER_REJECT;
        if (p.classList && p.classList.contains('glossary-term')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const targets = [];
    let n;
    while ((n = walker.nextNode())) targets.push(n);
    targets.forEach(text => {
      let v = text.nodeValue;
      let lower = v.toLowerCase();
      // Find earliest match across all keys
      let earliest = null;
      for (const key of GLOSSARY_KEYS) {
        const i = lower.indexOf(key.toLowerCase());
        if (i === -1) continue;
        // Word-boundary-ish: char before/after not a letter
        const before = i === 0 ? ' ' : v[i - 1];
        const after = (i + key.length >= v.length) ? ' ' : v[i + key.length];
        if (/[a-zA-Z]/.test(before) || /[a-zA-Z]/.test(after)) continue;
        if (earliest === null || i < earliest.i) earliest = { i, key };
      }
      if (!earliest) return;
      const before = v.slice(0, earliest.i);
      const match = v.slice(earliest.i, earliest.i + earliest.key.length);
      const after = v.slice(earliest.i + earliest.key.length);
      const parent = text.parentNode;
      const span = document.createElement('span');
      span.className = 'glossary-term';
      span.textContent = match;
      span.dataset.glossaryKey = earliest.key;
      span.addEventListener('mouseenter', (e) => {
        showGlossaryTooltip(earliest.key, span.getBoundingClientRect());
      });
      span.addEventListener('mouseleave', hideGlossaryTooltip);
      parent.insertBefore(document.createTextNode(before), text);
      parent.insertBefore(span, text);
      const afterNode = document.createTextNode(after);
      parent.insertBefore(afterNode, text);
      parent.removeChild(text);
      // Recurse on after-text in case it has more terms
      // (handled by walker on subsequent iterations only for new nodes — for now single match per text node is OK)
    });
  }

  // ── INIT ──
  document.getElementById('docCountLabel').textContent = `(${docs.length})`;
  initFilters();
  renderGrid();
  refreshTasksBadge();
  // Open doc if URL has a matching hash (e.g. shared link to a specific doc)
  openFromHash();
  // Listen for in-page hash changes too (e.g. user pastes a new hash in URL bar)
  window.addEventListener('hashchange', openFromHash);

}

async function _maraDecrypt(password) {
  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const salt = fromB64(ENC_PAYLOAD.salt);
  const iv = fromB64(ENC_PAYLOAD.iv);
  const data = fromB64(ENC_PAYLOAD.data);
  const km = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    km,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
  return JSON.parse(dec.decode(plain));
}

async function _maraUnlock() {
  const pw = document.getElementById('gatePassword').value;
  const errEl = document.getElementById('gateError');
  errEl.hidden = true;
  try {
    console.log('[gate] attempting decrypt — input length:', pw.length);
    const idx = await _maraDecrypt(pw);
    console.log('[gate] decrypt OK — docs:', idx.docs && idx.docs.length);
    window.MARA_INDEX = idx;
    document.getElementById('gateOverlay').remove();
    document.body.classList.remove('locked');
    startMaraApp();
  } catch (e) {
    console.error('[gate] decrypt failed:', e.name, e.message || '(no message)', e);
    errEl.hidden = false;
  }
}

document.getElementById('gateUnlock').addEventListener('click', _maraUnlock);
document.getElementById('gatePassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') _maraUnlock();
});
