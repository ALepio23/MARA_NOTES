<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MARA.notes</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e4e4e2;
      --border-subtle: #f0f0ee;
      --text-primary: #0c0c0c;
      --text-secondary: #5a5a57;
      --text-muted: #9a9a96;
      --accent: #1a1a1a;
      --accent-hover: #333333;
      --chip-bg: #f0f0ee;
      --chip-text: #3a3a38;
      --warning-bg: #fffbeb;
      --warning-border: #f5d66a;
      --warning-text: #7a5a00;
      --drawer-width: 520px;
      --radius: 8px;
      --radius-sm: 5px;
      --font: -apple-system, "SF Pro Text", system-ui, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 250, 248, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 52px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .header-title span {
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 4px;
    }
    .header-search {
      flex: 1;
      max-width: 320px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      height: 32px;
      padding: 0 10px 0 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font: inherit;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .header-search input:focus { border-color: var(--accent); }
    .header-search input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 13px;
    }
    .doc-count {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── FILTER BAR ── */
    .filterbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .filterbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chip-btn {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      font: inherit;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      user-select: none;
    }
    .chip-btn:hover { border-color: var(--accent); color: var(--accent); }
    .chip-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-date-range {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-date-range input {
      height: 24px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      font: inherit;
      font-size: 12px;
      color: var(--text-secondary);
      outline: none;
      width: 118px;
      transition: border-color 0.15s;
    }
    .filter-date-range input:focus { border-color: var(--accent); }
    .filter-date-range span { font-size: 11px; color: var(--text-muted); }

    .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .clear-btn {
      height: 24px;
      padding: 0 8px;
      border: none;
      background: none;
      font: inherit;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color 0.12s;
    }
    .clear-btn:hover { color: var(--accent); }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── CARD GRID ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 130px;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .type-chip {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--chip-bg);
      color: var(--chip-text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-date {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .card-summary {
      font-size: 12.5px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: auto;
    }
    .mini-chip {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 9px;
      font-size: 11px;
      background: var(--border-subtle);
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .empty-state h3 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 13px;
      line-height: 1.6;
      max-width: 380px;
    }
    .empty-state code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--chip-bg);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text-secondary);
    }

    /* ── MODAL BACKDROP (full-screen overlay) ── */
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .drawer-backdrop.open { display: block; }

    /* ── MODAL (full-screen, centered content) ── */
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: var(--surface);
      z-index: 201;
      display: flex;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.98);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0.18s;
    }
    .drawer.open {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0s;
    }

    .drawer-header {
      padding: 18px 32px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface);
    }
    .drawer-header-inner {
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .drawer-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .drawer-title {
      font-size: 22px;
      font-weight: 650;
      color: var(--text-primary);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    .drawer-close {
      width: 34px;
      height: 34px;
      border: none;
      background: var(--chip-bg);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s;
      line-height: 1;
    }
    .drawer-close:hover { background: var(--border); }

    .drawer-meta-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .lang-badge {
      height: 18px;
      padding: 0 6px;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 500;
      background: var(--border-subtle);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .drawer-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }
    .drawer-body-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── AUDIENCE BADGE (on cards + modal header) ── */
    .audience-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 10px;
      border-radius: 11px;
      font-size: 11.5px;
      font-weight: 600;
      background: var(--accent-soft, #f4f0ff);
      color: var(--accent-strong, #5a3fd6);
      border: 1px solid var(--accent-border, #e1d8ff);
      letter-spacing: 0.01em;
    }
    .audience-badge::before {
      content: '→';
      font-weight: 400;
      opacity: 0.7;
    }
    .audience-badge.audience-dev { background: #eaf3ff; color: #1c5db0; border-color: #cfe2fa; }
    .audience-badge.audience-cofounder { background: #fff4e6; color: #b35a00; border-color: #ffd9a8; }
    .audience-badge.audience-investor { background: #eafaf1; color: #1f7a4d; border-color: #c4ebd7; }
    .audience-badge.audience-partner { background: #fdebf2; color: #b6285c; border-color: #f5c2d4; }
    .audience-badge.audience-self { background: #f1f0ed; color: #555550; border-color: #e0ddd6; }

    /* ── MARKDOWN RENDER ── */
    .md-body {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .md-body h1 { font-size: 18px; font-weight: 700; margin: 1.6em 0 0.5em; letter-spacing: -0.02em; }
    .md-body h2 { font-size: 15px; font-weight: 650; margin: 1.4em 0 0.4em; letter-spacing: -0.01em; color: var(--text-primary); }
    .md-body h3 { font-size: 13.5px; font-weight: 600; margin: 1.2em 0 0.3em; }
    .md-body h1:first-child, .md-body h2:first-child, .md-body h3:first-child { margin-top: 0; }
    .md-body p { margin-bottom: 0.8em; }
    .md-body ul, .md-body ol { padding-left: 1.4em; margin-bottom: 0.8em; }
    .md-body li { margin-bottom: 0.2em; }
    .md-body strong { font-weight: 650; }
    .md-body em { font-style: italic; }
    .md-body code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--chip-bg);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text-secondary);
    }
    .md-body pre {
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin-bottom: 0.8em;
    }
    .md-body pre code { background: none; padding: 0; font-size: 12px; }
    .md-body blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      margin: 0 0 0.8em;
      color: var(--text-secondary);
    }
    .md-body hr { border: none; border-top: 1px solid var(--border-subtle); margin: 1.2em 0; }
    .md-body a { color: var(--accent); text-decoration: underline; }
    .md-body table { width: 100%; border-collapse: collapse; margin-bottom: 0.8em; font-size: 12.5px; }
    .md-body th, .md-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-body th { background: var(--border-subtle); font-weight: 600; }

    /* ── DISCREPANCY WARNING ── */
    .discrepancy-box {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12.5px;
      color: var(--warning-text);
      line-height: 1.5;
    }
    .discrepancy-box strong { font-weight: 600; }

    /* ── METADATA FOOTER ── */
    .meta-section {
      border-top: 1px solid var(--border-subtle);
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .meta-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .meta-key {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      min-width: 80px;
      padding-top: 2px;
    }
    .meta-val {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .meta-val-text {
      font-size: 12.5px;
      color: var(--text-secondary);
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 7px;
      border-radius: 9px;
      font-size: 11px;
      background: var(--chip-bg);
      color: var(--chip-text);
    }
    .iteration-note {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── TYPE CHIP COLORS ── */
    .type-partnership-brief { background: #eef2ff; color: #3730a3; }
    .type-meeting-recap     { background: #f0fdf4; color: #166534; }
    .type-dev-brief         { background: #f8fafc; color: #334155; border: 1px solid #e2e8f0; }
    .type-strategy-memo     { background: #fdf4ff; color: #6b21a8; }
    .type-deep-dive         { background: #fff7ed; color: #9a3412; }
    .type-followup-email    { background: #ecfeff; color: #155e75; }
    .type-action-items      { background: #fef2f2; color: #991b1b; }
    .type-decision-log      { background: #f5f3ff; color: #4c1d95; }
    .type-investor-update   { background: #fff1f2; color: #881337; }
    .type-concept-brief     { background: #fffbeb; color: #92400e; }
    .type-cofounder-digest  { background: #f0fdfa; color: #134e4a; }
  
/* === GATE OVERLAY === */
.gate-overlay {
  position: fixed; inset: 0;
  background: #fafaf9;
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.gate-card {
  max-width: 360px; width: 90%;
  padding: 32px 28px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; gap: 12px;
}
.gate-title { font-size: 20px; font-weight: 600; }
.gate-sub { font-size: 13px; color: #666; margin-bottom: 8px; }
.gate-card input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font: inherit; }
.gate-card input:focus { outline: 2px solid #111; outline-offset: 0; }
.gate-card button { padding: 10px; background: #111; color: white; border: 0; border-radius: 8px; cursor: pointer; font: inherit; }
.gate-card button:hover { background: #333; }
.gate-error { color: #c00; font-size: 13px; }
body.locked > *:not(.gate-overlay) { display: none !important; }
</style>
</head>
<body class="locked">
<div class="gate-overlay" id="gateOverlay">
  <div class="gate-card">
    <div class="gate-title">MARA.notes</div>
    <div class="gate-sub">Inserisci la password per sbloccare il viewer.</div>
    <input type="password" id="gatePassword" autofocus placeholder="Password" />
    <button id="gateUnlock">Sblocca</button>
    <div class="gate-error" id="gateError" hidden>Password errata. Riprova.</div>
  </div>
</div>


<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-title">MARA.notes <span id="docCountLabel"></span></div>
    <div class="header-search">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Cerca titolo, persone, aziende…" autocomplete="off">
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filterbar">
  <div class="filterbar-inner">

    <div class="filter-group">
      <span class="filter-label">Tipo</span>
      <div class="filter-chips" id="typeFilters"></div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">Data</span>
      <div class="filter-date-range">
        <input type="date" id="dateFrom" title="Da">
        <span>–</span>
        <input type="date" id="dateTo" title="A">
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">Lingua</span>
      <div class="filter-chips" id="langFilters">
        <button class="chip-btn active" data-lang="all">Tutti</button>
        <button class="chip-btn" data-lang="it">IT</button>
        <button class="chip-btn" data-lang="en">EN</button>
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">Persone</span>
      <div class="filter-chips" id="personFilters"></div>
    </div>

    <div class="filter-divider" id="projectDivider" style="display:none"></div>

    <div class="filter-group" id="projectFilterGroup" style="display:none">
      <span class="filter-label">Progetto</span>
      <div class="filter-chips" id="projectFilters"></div>
    </div>

    <button class="clear-btn" id="clearFilters">Azzera</button>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="card-grid" id="cardGrid"></div>
</main>

<!-- DRAWER BACKDROP -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>

<!-- DRAWER -->
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Documento">
  <div class="drawer-header">
    <div class="drawer-header-inner">
      <div class="drawer-header-top">
        <h2 class="drawer-title" id="drawerTitle"></h2>
        <button class="drawer-close" id="drawerClose" aria-label="Chiudi">✕</button>
      </div>
      <div class="drawer-meta-line" id="drawerMetaLine"></div>
    </div>
  </div>
  <div class="drawer-body">
    <div class="drawer-body-inner" id="drawerBody"></div>
  </div>
</aside>

<script>
function startMaraApp() {
  // ── DATA ──
  const INDEX = window.MARA_INDEX || {version: 1, docs: []};
  const docs = (INDEX && INDEX.docs) ? INDEX.docs : [];

  // ── TYPE LABELS ──
  const TYPE_LABELS = {
    'partnership-brief':  'Partnership recap',
    'meeting-recap':      'Meeting recap',
    'dev-brief':          'Dev brief',
    'strategy-memo':      'Strategy memo',
    'deep-dive':          'Deep-dive',
    'followup-email':     'Follow-up email',
    'action-items':       'Action items',
    'decision-log':       'Decision log',
    'investor-update':    'Investor update',
    'concept-brief':      'Concept brief',
    'cofounder-digest':   'Cofounder digest',
  };
  const TYPE_CSS = {
    'partnership-brief':  'type-partnership-brief',
    'meeting-recap':      'type-meeting-recap',
    'dev-brief':          'type-dev-brief',
    'strategy-memo':      'type-strategy-memo',
    'deep-dive':          'type-deep-dive',
    'followup-email':     'type-followup-email',
    'action-items':       'type-action-items',
    'decision-log':       'type-decision-log',
    'investor-update':    'type-investor-update',
    'concept-brief':      'type-concept-brief',
    'cofounder-digest':   'type-cofounder-digest',
  };
  function typeLabel(t) { return TYPE_LABELS[t] || t; }
  function typeClass(t) { return TYPE_CSS[t] || ''; }

  // ── AUDIENCE INFERENCE ──
  // Derives "for whom" from doc type + entities. Returns {label, css_class}.
  function audienceFor(doc) {
    const t = doc.type || '';
    const people = doc.people || [];
    const companies = doc.companies || [];
    const firstPerson = people[0] || '';
    const firstCompany = companies[0] || '';

    switch (t) {
      case 'dev-brief':
        // Davide is the canonical dev recipient per mara-context/voice.md
        return { label: firstPerson ? `Per ${firstPerson}` : 'Per Davide', cls: 'audience-dev' };
      case 'cofounder-digest':
        return { label: 'Per co-founder', cls: 'audience-cofounder' };
      case 'investor-update':
        return { label: 'Per investitori', cls: 'audience-investor' };
      case 'partnership-brief':
        return { label: firstCompany ? `Per ${firstCompany}` : 'Archivio partnership', cls: 'audience-partner' };
      case 'followup-email':
        return { label: firstPerson ? `Per ${firstPerson}` : 'Email follow-up', cls: 'audience-partner' };
      case 'meeting-recap':
        return { label: 'Archivio call', cls: 'audience-self' };
      case 'action-items':
        return { label: firstPerson ? `Owner: ${firstPerson}` : 'Per team', cls: 'audience-self' };
      case 'decision-log':
        return { label: 'Archivio decisioni', cls: 'audience-self' };
      case 'strategy-memo':
        return { label: 'Strategia interna', cls: 'audience-self' };
      case 'concept-brief':
        return { label: 'Idea da sviluppare', cls: 'audience-self' };
      case 'deep-dive':
        return { label: 'Ricerca personale', cls: 'audience-self' };
      default:
        return { label: '', cls: 'audience-self' };
    }
  }

  // ── STATE ──
  const state = {
    search: '',
    types: new Set(),
    lang: 'all',
    dateFrom: '',
    dateTo: '',
    persons: new Set(),
    projects: new Set(),
  };

  // ── DERIVED FILTER OPTIONS ──
  const allTypes   = [...new Set(docs.map(d => d.type))].sort();
  const allPersons = [...new Set(docs.flatMap(d => d.people || []))].sort();
  const allProjects= [...new Set(docs.flatMap(d => d.mara_projects || []))].sort();

  // ── RENDER FILTER CHIPS ──
  function buildChips(containerId, items, stateSet, labelFn) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'chip-btn';
      btn.textContent = labelFn ? labelFn(item) : item;
      btn.dataset.value = item;
      if (stateSet.has(item)) btn.classList.add('active');
      btn.addEventListener('click', () => {
        if (stateSet.has(item)) stateSet.delete(item);
        else stateSet.add(item);
        btn.classList.toggle('active');
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function initFilters() {
    buildChips('typeFilters', allTypes, state.types, typeLabel);

    if (allPersons.length > 0) {
      buildChips('personFilters', allPersons.slice(0, 8), state.persons);
    }

    if (allProjects.length > 0) {
      document.getElementById('projectDivider').style.display = '';
      document.getElementById('projectFilterGroup').style.display = '';
      buildChips('projectFilters', allProjects, state.projects);
    }

    // Lang chips
    document.querySelectorAll('#langFilters .chip-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#langFilters .chip-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.lang = btn.dataset.lang;
        renderGrid();
      });
    });

    // Date range
    document.getElementById('dateFrom').addEventListener('change', e => {
      state.dateFrom = e.target.value;
      renderGrid();
    });
    document.getElementById('dateTo').addEventListener('change', e => {
      state.dateTo = e.target.value;
      renderGrid();
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      state.search = e.target.value.toLowerCase();
      renderGrid();
    });

    // Clear
    document.getElementById('clearFilters').addEventListener('click', clearFilters);
  }

  function clearFilters() {
    state.search = '';
    state.types.clear();
    state.lang = 'all';
    state.dateFrom = '';
    state.dateTo = '';
    state.persons.clear();
    state.projects.clear();

    document.getElementById('searchInput').value = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';

    document.querySelectorAll('#typeFilters .chip-btn, #personFilters .chip-btn, #projectFilters .chip-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('#langFilters .chip-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === 'all');
    });

    renderGrid();
  }

  // ── FILTER DOCS ──
  function filterDocs() {
    return docs.filter(doc => {
      if (state.types.size > 0 && !state.types.has(doc.type)) return false;

      if (state.lang !== 'all' && (doc.language || 'it').toLowerCase() !== state.lang) return false;

      if (state.dateFrom && doc.date < state.dateFrom) return false;
      if (state.dateTo   && doc.date > state.dateTo)   return false;

      if (state.persons.size > 0) {
        const docPeople = (doc.people || []).map(p => p.toLowerCase());
        const match = [...state.persons].some(p => docPeople.includes(p.toLowerCase()));
        if (!match) return false;
      }

      if (state.projects.size > 0) {
        const docProj = doc.mara_projects || [];
        const match = [...state.projects].some(p => docProj.includes(p));
        if (!match) return false;
      }

      if (state.search) {
        const needle = state.search;
        const haystack = [
          doc.title || '',
          doc.summary || '',
          ...(doc.people || []),
          ...(doc.companies || []),
          ...(doc.mara_projects || []),
          doc.type || '',
        ].join(' ').toLowerCase();
        if (!haystack.includes(needle)) return false;
      }

      return true;
    });
  }

  // ── FORMAT DATE ──
  function fmtDate(str) {
    if (!str) return '';
    const parts = str.split('-');
    if (parts.length !== 3) return str;
    const [y, m, d] = parts;
    const mi = parseInt(m, 10);
    const di = parseInt(d, 10);
    const months = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
    if (!mi || mi < 1 || mi > 12 || !di) return str;
    return `${di} ${months[mi-1]} ${y}`;
  }

  // ── RENDER CARD ──
  function createCard(doc) {
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', () => openDrawer(doc));

    const top = document.createElement('div');
    top.className = 'card-top';

    const chip = document.createElement('span');
    chip.className = `type-chip ${typeClass(doc.type)}`;
    chip.textContent = typeLabel(doc.type);
    top.appendChild(chip);

    const date = document.createElement('span');
    date.className = 'card-date';
    date.textContent = fmtDate(doc.date);
    top.appendChild(date);

    // Audience badge prepared (appended in proper order below)
    const aud = audienceFor(doc);
    let audBadge = null;
    if (aud.label) {
      audBadge = document.createElement('span');
      audBadge.className = `audience-badge ${aud.cls}`;
      audBadge.textContent = aud.label;
    }

    const title = document.createElement('h3');
    title.className = 'card-title';
    title.textContent = doc.title || doc.filename || '(Senza titolo)';

    const summary = document.createElement('p');
    summary.className = 'card-summary';
    summary.textContent = doc.summary || '';

    const chipsRow = document.createElement('div');
    chipsRow.className = 'card-chips';

    const allItems = [...(doc.people || []), ...(doc.companies || [])].slice(0, 4);
    allItems.forEach(item => {
      const c = document.createElement('span');
      c.className = 'mini-chip';
      c.textContent = item;
      chipsRow.appendChild(c);
    });

    card.appendChild(top);
    if (audBadge) card.appendChild(audBadge);
    card.appendChild(title);
    if (doc.summary) card.appendChild(summary);
    if (allItems.length > 0) card.appendChild(chipsRow);

    return card;
  }

  // ── RENDER GRID ──
  function renderGrid() {
    const grid = document.getElementById('cardGrid');
    const filtered = filterDocs();
    grid.innerHTML = '';

    document.getElementById('docCountLabel').textContent = `(${filtered.length}/${docs.length})`;

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      if (docs.length === 0) {
        empty.innerHTML = `
          <div class="empty-icon">📄</div>
          <h3>Nessun documento ancora.</h3>
          <p>Aggiungi appunti in <code>~/Desktop/MARA.notes/_inbox/</code> o incollali in chat.</p>`;
      } else {
        empty.innerHTML = `
          <div class="empty-icon">🔍</div>
          <h3>Nessun risultato.</h3>
          <p>Prova a modificare i filtri o la ricerca.</p>`;
      }
      grid.appendChild(empty);
      return;
    }

    // Sort: newest first (stable comparator — returns 0 for equal dates)
    const sorted = [...filtered].sort((a, b) => {
      const da = a.date || '';
      const db = b.date || '';
      if (db > da) return 1;
      if (db < da) return -1;
      return 0;
    });
    sorted.forEach(doc => grid.appendChild(createCard(doc)));
  }

  // ── DRAWER ──
  let currentDoc = null;

  function openDrawer(doc) {
    currentDoc = doc;
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('drawerBackdrop');

    document.getElementById('drawerTitle').textContent = doc.title || doc.filename || '(Senza titolo)';

    // Meta line
    const metaLine = document.getElementById('drawerMetaLine');
    metaLine.innerHTML = '';
    const tChip = document.createElement('span');
    tChip.className = `type-chip ${typeClass(doc.type)}`;
    tChip.textContent = typeLabel(doc.type);
    metaLine.appendChild(tChip);

    const dateSpan = document.createElement('span');
    dateSpan.className = 'drawer-date';
    dateSpan.textContent = fmtDate(doc.date);
    metaLine.appendChild(dateSpan);

    if (doc.language && doc.language.toLowerCase() !== 'it') {
      const langBadge = document.createElement('span');
      langBadge.className = 'lang-badge';
      langBadge.textContent = doc.language.toUpperCase();
      metaLine.appendChild(langBadge);
    }

    // Audience badge in modal header (same logic as cards)
    const audM = audienceFor(doc);
    if (audM.label) {
      const audBadgeM = document.createElement('span');
      audBadgeM.className = `audience-badge ${audM.cls}`;
      audBadgeM.textContent = audM.label;
      metaLine.appendChild(audBadgeM);
    }

    // Body
    const body = document.getElementById('drawerBody');
    body.innerHTML = '';

    // Discrepancy warning
    if (doc.discrepancies_flagged) {
      const warn = document.createElement('div');
      warn.className = 'discrepancy-box';
      warn.innerHTML = '<strong>⚠ Discrepanze tra fonti</strong> — Questo documento contiene discrepanze segnalate. Controlla la sezione "Discrepanze" nel testo.';
      body.appendChild(warn);
    }

    // MD body
    if (doc.body_md) {
      const mdContainer = document.createElement('div');
      mdContainer.className = 'md-body';
      // Strip YAML frontmatter if present
      let mdText = doc.body_md;
      if (mdText.startsWith('---')) {
        const endIdx = mdText.indexOf('---', 3);
        if (endIdx !== -1) mdText = mdText.slice(endIdx + 3).trim();
      }
      if (window.marked && window.DOMPurify) {
        // Sanitize marked.js output to prevent XSS from user-generated/AI-generated content
        mdContainer.innerHTML = DOMPurify.sanitize(marked.parse(mdText));
      } else {
        // Fallback: plain text (safer than unsanitized HTML if either CDN failed to load)
        const pre = document.createElement('pre');
        pre.style.cssText = 'white-space:pre-wrap;font:inherit;';
        pre.textContent = mdText;
        mdContainer.appendChild(pre);
      }
      body.appendChild(mdContainer);
    }

    // Metadata footer
    const meta = document.createElement('div');
    meta.className = 'meta-section';

    function metaRow(key, items, isChips) {
      if (!items || (Array.isArray(items) && items.length === 0)) return;
      if (!Array.isArray(items)) items = [items];
      const row = document.createElement('div');
      row.className = 'meta-row';
      const k = document.createElement('span');
      k.className = 'meta-key';
      k.textContent = key;
      const v = document.createElement('div');
      v.className = 'meta-val';
      if (isChips) {
        items.forEach(item => {
          const c = document.createElement('span');
          c.className = 'meta-chip';
          c.textContent = item;
          v.appendChild(c);
        });
      } else {
        const t = document.createElement('span');
        t.className = 'meta-val-text';
        t.textContent = items.join(', ');
        v.appendChild(t);
      }
      row.appendChild(k);
      row.appendChild(v);
      meta.appendChild(row);
    }

    metaRow('Persone', doc.people, true);
    metaRow('Aziende', doc.companies, true);
    metaRow('Progetti', doc.mara_projects, true);
    metaRow('Fonti', doc.sources_used, false);

    if (doc.iteration_count && doc.iteration_count > 1) {
      const iter = document.createElement('p');
      iter.className = 'iteration-note';
      iter.textContent = `Iterazione ${doc.iteration_count} · Aggiornato ${doc.updated_at || ''}`;
      meta.appendChild(iter);
    }

    if (meta.children.length > 0) body.appendChild(meta);

    drawer.classList.add('open');
    backdrop.classList.add('open');
    body.scrollTop = 0;
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerBackdrop').classList.remove('open');
    currentDoc = null;
  }

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('drawerBackdrop').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
  });

  // ── INIT ──
  document.getElementById('docCountLabel').textContent = `(${docs.length})`;
  initFilters();
  renderGrid();

}
</script>

async function _maraDecrypt(password) {
  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const salt = fromB64(ENC_PAYLOAD.salt);
  const iv = fromB64(ENC_PAYLOAD.iv);
  const data = fromB64(ENC_PAYLOAD.data);
  const km = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    km,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
  return JSON.parse(dec.decode(plain));
}

async function _maraUnlock() {
  const pw = document.getElementById('gatePassword').value;
  const errEl = document.getElementById('gateError');
  errEl.hidden = true;
  try {
    console.log('[gate] attempting decrypt — input length:', pw.length);
    const idx = await _maraDecrypt(pw);
    console.log('[gate] decrypt OK — docs:', idx.docs && idx.docs.length);
    window.MARA_INDEX = idx;
    document.getElementById('gateOverlay').remove();
    document.body.classList.remove('locked');
    startMaraApp();
  } catch (e) {
    console.error('[gate] decrypt failed:', e.name, e.message || '(no message)', e);
    errEl.hidden = false;
  }
}

document.getElementById('gateUnlock').addEventListener('click', _maraUnlock);
document.getElementById('gatePassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') _maraUnlock();
});
